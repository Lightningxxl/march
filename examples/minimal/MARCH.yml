repo:
  canonical_branch: "main"
tracker:
  kind: "feishu_task"
  tasklist_guid: "YOUR_TASKLIST_GUID"
  identity: "user"
  task_key_prefix: "demo"
  lark_cli_command: "lark-cli"
  comments_cache_ttl_ms: 60000
  task_fetch_max_concurrency: 2
  default_stage: "Backlog"
  builder_states:
    - Building
    - Merging
  planner_states:
    - Planning
  auditor_states:
    - Auditing
  terminal_states:
    - Done
    - Canceled
polling:
  hot_poll_interval_ms: 30000
  full_scan_interval_ms: 60000
  idle_full_scan_interval_ms: 300000
  idle_after_empty_full_scans: 3
workspace:
  root: "/tmp/march-workspaces"
agent:
  max_concurrent_agents: 4
  max_turns: 20
codex:
  command: codex app-server
  approval_policy: never
  thread_sandbox: danger-full-access
